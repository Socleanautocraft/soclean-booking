<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <title>Soclean Auto Craft Booking</title>

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px 14px 40px;
      background: #f4f4f4;
      color: #1f1f1f;
      font-family: Arial, "Noto Sans Thai", sans-serif;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px 28px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 5px 22px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 82px;
      height: 82px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #111111;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 11px;
      line-height: 1.3;
      letter-spacing: 0.4px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 26px;
    }

    .subtitle {
      margin: 7px 0 22px;
      text-align: center;
      color: #666666;
      font-size: 15px;
    }

    .loading {
      padding: 32px 10px;
      text-align: center;
      color: #666666;
      line-height: 1.7;
    }

    .profile-box {
      display: none;
      margin-bottom: 20px;
      padding: 12px 14px;
      border-radius: 11px;
      background: #f1f7f1;
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 17px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      font-weight: bold;
    }

    .required {
      color: #c62828;
    }

    input,
    select {
      width: 100%;
      padding: 13px 12px;
      border: 1px solid #cccccc;
      border-radius: 10px;
      background: #ffffff;
      font-size: 16px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #222222;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #111111;
      color: #ffffff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999999;
      cursor: not-allowed;
    }

    #bookingForm {
      display: none;
    }

    .status {
      display: none;
      margin-top: 17px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      line-height: 1.6;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #176b2c;
    }

    .status.error {
      display: block;
      background: #fdecea;
      color: #b3261e;
    }

    .note {
      margin-top: 17px;
      color: #777777;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      SOCLEAN<br>AUTO CRAFT
    </div>

    <h1>จองคิวออนไลน์</h1>
    <p class="subtitle">Soclean Auto Craft</p>

    <div id="loading" class="loading">
      กำลังเชื่อมต่อกับ LINE<br>
      กรุณารอสักครู่ค่ะ
    </div>

    <div id="profileBox" class="profile-box">
      เข้าสู่ระบบด้วย LINE:
      <strong id="displayName"></strong>
    </div>

    <form id="bookingForm">
      <div class="field">
        <label for="name">
          ชื่อหรือชื่อเล่น <span class="required">*</span>
        </label>

        <input
          id="name"
          type="text"
          placeholder="เช่น ไข่มุก"
          required
        >
      </div>

      <div class="field">
        <label for="tel">
          เบอร์โทรศัพท์ <span class="required">*</span>
        </label>

        <input
          id="tel"
          type="tel"
          inputmode="numeric"
          maxlength="10"
          placeholder="เช่น 0812345678"
          required
        >
      </div>

      <div class="field">
        <label for="plateNo">
          ทะเบียนรถ <span class="required">*</span>
        </label>

        <input
          id="plateNo"
          type="text"
          placeholder="เช่น 4ขบ3684"
          required
        >
      </div>

      <div class="field">
        <label for="carBrand">
          แบรนด์รถ <span class="required">*</span>
        </label>

        <input
          id="carBrand"
          type="text"
          placeholder="เช่น BYD"
          required
        >
      </div>

      <div class="field">
        <label for="model">
          รุ่นรถ <span class="required">*</span>
        </label>

        <input
          id="model"
          type="text"
          placeholder="เช่น Atto 3"
          required
        >
      </div>

      <div class="field">
        <label for="service">
          บริการที่ต้องการ <span class="required">*</span>
        </label>

        <select id="service" required>
          <option value="">— กรุณาเลือกบริการ —</option>
          <option value="ล้างสี / ดูดฝุ่น">ล้างสี / ดูดฝุ่น</option>
          <option value="ล้างเคลือบสี">ล้างเคลือบสี</option>
          <option value="ล้างห้องเครื่อง">ล้างห้องเครื่อง</option>
          <option value="ฟอกเบาะ / ซักภายใน">ฟอกเบาะ / ซักภายใน</option>
          <option value="ขัดสีรถ">ขัดสีรถ</option>
          <option value="ขัดลบรอย">ขัดลบรอย</option>
          <option value="เคลือบแก้ว">เคลือบแก้ว</option>
          <option value="เคลือบกราฟีน">เคลือบกราฟีน</option>
          <option value="ติดฟิล์มกรองแสง">ติดฟิล์มกรองแสง</option>
          <option value="ติดฟิล์ม PPF">ติดฟิล์ม PPF</option>
          <option value="Wrap เปลี่ยนสีรถ">Wrap เปลี่ยนสีรถ</option>
          <option value="บริการอื่น ๆ">บริการอื่น ๆ</option>
        </select>
      </div>

      <div class="field">
        <label for="bookingDate">
          วันที่ต้องการจอง <span class="required">*</span>
        </label>

        <input
          id="bookingDate"
          type="date"
          required
        >
      </div>

      <div class="field">
        <label for="bookingTime">
          เวลาที่ต้องการจอง <span class="required">*</span>
        </label>

        <input
          id="bookingTime"
          type="time"
          required
        >
      </div>

      <button id="submitButton" type="submit">
        ยืนยันการจองคิว
      </button>

      <div id="statusBox" class="status"></div>

      <p class="note">
        หลังจากกดส่ง ระบบจะบันทึกข้อมูลและส่งข้อความยืนยัน
        กลับไปยัง LINE ของคุณค่ะ
      </p>
    </form>
  </main>

  <script>
    /*
      LIFF ID ของ Soclean Booking
      LIFF ID ไม่ใช่ Channel secret หรือ Channel access token
    */
    const LIFF_ID = "2010677402-picFYAiN";

    /*
      สำคัญ:
      นำ Webhook URL ที่คัดลอกจาก Make
      มาวางแทนข้อความระหว่างเครื่องหมายคำพูดด้านล่าง
    */
    const WEBHOOK_URL = "https://hook.eu1.make.com/4vkgd2y3kmy2hnyrnrtaad4dkhw89ot3";

    let lineUserId = "";
    let lineDisplayName = "";

    window.addEventListener("load", initializeApp);

    async function initializeApp() {
      const loading = document.getElementById("loading");
      const bookingForm = document.getElementById("bookingForm");
      const profileBox = document.getElementById("profileBox");

      try {
        await liff.init({
          liffId: LIFF_ID
        });

        /*
          หากเปิดจากเบราว์เซอร์ภายนอก
          ระบบจะพาเข้าสู่ระบบ LINE แล้วกลับมาหน้าเดิม
        */
        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });

          return;
        }

        const profile = await liff.getProfile();

        if (!profile || !profile.userId) {
          throw new Error("ไม่สามารถรับ LINE User ID ได้");
        }

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName || "ผู้ใช้ LINE";

        document.getElementById("displayName").textContent =
          lineDisplayName;

        loading.style.display = "none";
        profileBox.style.display = "block";
        bookingForm.style.display = "block";

        setMinimumBookingDate();
      } catch (error) {
        console.error(error);

        loading.innerHTML =
          "เชื่อมต่อ LINE ไม่สำเร็จค่ะ<br>" +
          escapeHtml(
            error && error.message
              ? error.message
              : String(error)
          );
      }
    }

    function setMinimumBookingDate() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      document.getElementById("bookingDate").min =
        ${year}-${month}-${day};
    }

    document
      .getElementById("bookingForm")
      .addEventListener("submit", submitBooking);

    async function submitBooking(event) {
      event.preventDefault();

      const submitButton =
        document.getElementById("submitButton");

      clearStatus();

      if (
        !WEBHOOK_URL ||
        WEBHOOK_URL === "วาง-MAKE-WEBHOOK-URL-ตรงนี้"
      ) {
        showError("ยังไม่ได้ใส่ Make Webhook URL ในโค้ดค่ะ");
        return;
      }

      if (!lineUserId) {
        showError(
          "ไม่พบ LINE User ID กรุณาปิดแล้วเปิดหน้าจองผ่าน LINE ใหม่ค่ะ"
        );

        return;
      }

      const tel = document
        .getElementById("tel")
        .value
        .replace(/[^0-9]/g, "");

      if (!/^0[0-9]{9}$/.test(tel)) {
        showError("กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลักค่ะ");
        return;
      }

      const data = new URLSearchParams();

      data.append("timestamp", new Date().toISOString());
      data.append("name", getValue("name"));
      data.append("tel", tel);
      data.append("plateNo", getValue("plateNo"));
      data.append("carBrand", getValue("carBrand"));
      data.append("model", getValue("model"));
      data.append("service", getValue("service"));
      data.append("bookingDate", getValue("bookingDate"));
      data.append("bookingTime", getValue("bookingTime"));
      data.append("lineUserId", lineUserId);
      data.append("lineDisplayName", lineDisplayName);
      data.append("source", "LIFF Soclean Booking");

      submitButton.disabled = true;
      submitButton.textContent = "กำลังส่งข้อมูล...";

      try {
        /*
          no-cors ช่วยให้หน้าเว็บส่งข้อมูลข้ามโดเมน
          ไปยัง Make Webhook ได้จาก GitHub Pages
        */
        await fetch(WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors",
          body: data
        });

        showSuccess(
          "รับข้อมูลการจองเรียบร้อยแล้วค่ะ ✅<br>" +
          "กรุณารอข้อความยืนยันจาก LINE ของร้าน"
        );

        document.getElementById("bookingForm").reset();
        setMinimumBookingDate();

        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth"
        });
      } catch (error) {
        console.error(error);

        showError(
          "ส่งข้อมูลไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่ค่ะ"
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "ยืนยันการจองคิว";
      }
    }

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function clearStatus() {
      const statusBox = document.getElementById("statusBox");

      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function showError(message) {
      const statusBox = document.getElementById("statusBox");

      statusBox.className = "status error";
      statusBox.textContent = message;
    }

    function showSuccess(message) {
      const statusBox = document.getElementById("statusBox");

      statusBox.className = "status success";
      statusBox.innerHTML = message;
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }
  </script>
</body>
</html>
